  force = true
  conditions = {Host = ["herocleanersllc.com", "www.herocleanersllc.com"]}

[[redirects]]
  from = "/Window-washing"
  to = "https://theherocleaners.com/window-washing"
  status = 301
  force = true
  conditions = {Host = ["herocleanersllc.com", "www.herocleanersllc.com"]}

[[redirects]]
  from = "/FAQs"
  to = "https://theherocleaners.com/faq"
  status = 301
  force = true
  conditions = {Host = ["herocleanersllc.com", "www.herocleanersllc.com"]}

[[redirects]]
  from = "/Reviews"
  to = "https://theherocleaners.com/reviews"
  status = 301
  force = true
  conditions = {Host = ["herocleanersllc.com", "www.herocleanersllc.com"]}

[[redirects]]
  from = "/services"
  to = "https://theherocleaners.com/"
  status = 301
  force = true
  conditions = {Host = ["herocleanersllc.com", "www.herocleanersllc.com"]}

# --- Catch-all: preserve path on the new domain ---

[[redirects]]
  from = "/*"
  to = "https://theherocleaners.com/:splat"
  status = 301
  force = true
  conditions = {Host = ["herocleanersllc.com", "www.herocleanersllc.com"]}
