[build]
  command = "npx @11ty/eleventy"
  publish = "_site"

[build.environment]
  NODE_VERSION = "18"

# ============================================================
# DOMAIN-LEVEL REDIRECTS — old slug to new slug (MUST come first)
# These handle old herocleanersllc.com URLs that Google has indexed
# ============================================================

