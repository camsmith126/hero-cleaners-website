  force = true
  conditions = {Host = ["herocleanersllc.com", "www.herocleanersllc.com"]}

[[redirects]]
  from = "/Recurring-Clean"
  to = "https://theherocleaners.com/recurring-cleaning"
  status = 301
  force = true
  conditions = {Host = ["herocleanersllc.com", "www.herocleanersllc.com"]}

[[redirects]]
  from = "/Commercial"
  to = "https://theherocleaners.com/commercial-cleaning"
