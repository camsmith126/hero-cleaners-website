[build]
  command = "npx @11ty/eleventy"
  publish = "_site"

[build.environment]
  NODE_VERSION = "18"

# ============================================================
# OLD DOMAIN REDIRECTS — herocleanersllc.com -> theherocleaners.com
#
# Uses conditions={Host=[...]} rather than hostname-prefixed `from`
# patterns. The hostname-prefixed form had two problems on this
# multi-alias setup:
#   1. force=true did not override static files at the same path
#      (e.g. /about, /window-washing kept serving 200 from _site/).
#   2. Cross-host destinations were rewritten to relative Location
#      headers, leaving the user on the old hostname after redirect.
# The conditions form fixes both.
# ============================================================

# --- Specific old-slug -> new-slug mappings (must come before catch-all) ---

[[redirects]]
  from = "/about-us"
  to = "https://theherocleaners.com/about"
  status = 301
  force = true
  conditions = {Host = ["herocleanersllc.com", "www.herocleanersllc.com"]}

[[redirects]]
  from = "/contact-us"
  to = "https://theherocleaners.com/contact"
  status = 301
  force = true
  conditions = {Host = ["herocleanersllc.com", "www.herocleanersllc.com"]}

