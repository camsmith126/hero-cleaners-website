name: Weekly Blog Post Generator

on:
  schedule:
    - cron: '0 15 * * 1'
  workflow_dispatch:

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_post.py

      - name: Commit and push new post
        run: |
          git config --global user.name "Hero Cleaners Blog Bot"
          git config --global user.email "herocleanersinfo@gmail.com"
          git add blog/ scripts/topics_tracker.json
          git diff --staged --quiet || git commit -m "chore: auto-publish weekly blog post [skip ci]"
          git push
